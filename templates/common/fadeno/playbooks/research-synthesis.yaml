# yaml-language-server: $schema=../schemas/playbook.schema.json
kind: AgentPlaybook
schema_version: "0.1"
name: research-synthesis
description: >
  Plan research questions, gather evidence per question, synthesize a draft,
  fact-check it, and produce a final report.
when_to_use:
  - open-ended research question
  - multiple sources must be gathered and compared
  - claims must be supported by evidence
  - a written synthesis is the deliverable
roles:
  coordinator:
    purpose: Frame the question, plan subquestions, and assemble the final report.
  researcher:
    purpose: Gather evidence and notes for a single subquestion.
  synthesizer:
    purpose: Merge findings into a coherent, well-structured draft.
  fact_checker:
    purpose: Check each claim against the gathered evidence and flag unsupported ones.
flow:
  - id: plan
    kind: actor_call
    actor: coordinator
    output: ResearchPlan

  - id: gather
    kind: map
    actor: researcher                 # each subquestion is handled by a researcher pass
    over: ResearchPlan.subquestions   # artifact-field reference; one pass per subquestion
    input:
      - ResearchPlan
    output: Findings[]

  - id: synthesize
    kind: reduce
    actor: synthesizer
    input:
      - Findings[]
    output: Draft

  - id: fact_check
    kind: evaluator
    actor: fact_checker
    input:
      - Draft
      - Findings[]
    output: FactCheckReport

  - id: finalize
    kind: actor_call
    actor: coordinator
    input:
      - Draft
      - FactCheckReport
    output: FinalReport
    terminal_status: completed

limits:
  max_iterations: 2
  max_actor_calls: 16

policies:
  max_subagents: 4
  require_user_approval_for:
    - external_send
