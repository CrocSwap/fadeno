# yaml-language-server: $schema=../schemas/playbook.schema.json
kind: AgentPlaybook
schema_version: "0.1"
name: code-change-review
description: >
  Plan, implement, review, test, and run a bounded revision loop for nontrivial
  code changes.
when_to_use:
  - nontrivial code change
  - multiple files may be touched
  - correctness matters
  - tests or review are useful
roles:
  coordinator:
    purpose: Plan, route, merge, and decide completion.
  implementer:
    purpose: Make the code change.
  substance_reviewer:
    purpose: Review correctness, architecture, edge cases, safety, and tests.
  style_reviewer:
    purpose: Review clarity, maintainability, conventions, and docs.
flow:
  - id: plan
    kind: actor_call
    actor: coordinator
    output: Plan

  - id: implement
    kind: actor_call
    actor: implementer
    input:
      - Plan
    output: ImplementationResult

  - id: review
    kind: map
    over:
      - substance_reviewer
      - style_reviewer
    input:
      - ImplementationResult
    output: ReviewReport[]

  - id: review_gate
    kind: gate
    input:
      - ReviewReport[]
    condition: no_blocking_issues
    on_pass: test
    on_fail: revise

  - id: revise
    kind: loop
    input:
      - ReviewReport[]
    body:
      - implement_revision
      - review_revision
    max_iterations: 1
    until: no_blocking_issues
    on_success: test
    on_exhausted: unresolved_review

  # --- loop body (definitions only; the loop executes them in listed order) ---
  - id: implement_revision
    kind: actor_call
    actor: implementer
    input:
      - ImplementationResult
      - ReviewReport[]
    output: ImplementationResult

  - id: review_revision
    kind: map
    over:
      - substance_reviewer
      - style_reviewer
    input:
      - ImplementationResult
    output: ReviewReport[]

  - id: test
    kind: tool_call
    tool: test_runner
    input:
      - ImplementationResult
    output: TestResult
    next: test_gate

  - id: test_gate
    kind: gate
    input:
      - TestResult
    condition: tests_pass
    on_pass: final
    on_fail: tests_failed

  - id: final
    kind: actor_call
    actor: coordinator
    input:
      - ImplementationResult
      - ReviewReport[]
      - TestResult
    output: FinalSummary
    terminal_status: completed

  - id: tests_failed
    kind: actor_call
    actor: coordinator
    input:
      - ImplementationResult
      - TestResult
    output: FinalSummary
    terminal_status: failed

  - id: unresolved_review
    kind: actor_call
    actor: coordinator
    input:
      - ImplementationResult
    output: FinalSummary
    terminal_status: failed

policies:
  max_revision_loops: 1
  max_subagents: 4
  # ADVISORY in instruction-only hosts. For real enforcement, wire these to
  # pre-commit/CI (or Claude Code hooks). See .fadeno/enforcement.md.
  require_user_approval_for:
    - destructive_commands
    - dependency_addition
    - deploy
    - external_send
